# Bonus A — CI/CD pipeline (.github/workflows/deploy.yml)
#
# TODO: Implement a lint -> test -> deploy workflow.
#   - lint:   ruff check on agent/ and client/
#   - test:   a smoke test that imports and compiles the graph
#   - deploy: ONLY on push to main; log the model, register a new UC version,
#             and update the serving endpoint. Use GitHub Secrets for
#             DATABRICKS_HOST / DATABRICKS_TOKEN. Add a workflow_dispatch trigger.

name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:   # manual trigger

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Lint with ruff
        run: uv run ruff check agent/ client/
      - name: Smoke test
        run: uv run pytest tests/test_smoke.py

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Deploy model
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          UC_CATALOG: main
          UC_SCHEMA: default
          VECTOR_SEARCH_ENDPOINT: ${{ secrets.VECTOR_SEARCH_ENDPOINT }}
          VECTOR_SEARCH_INDEX: ${{ secrets.VECTOR_SEARCH_INDEX }}
          EMBEDDINGS_ENDPOINT: databricks-gte-large-en
          DATABRICKS_MODEL: databricks-meta-llama-3-3-70b-instruct
        run: uv run python deployment/deploy.py
      - name: Print confirmation
        run: echo "🎉 Deployment triggered successfully."